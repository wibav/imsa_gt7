<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1420"/>
      <stop offset="100%" stop-color="#14283c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g stroke="#fb923c" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="473" x2="1200" y2="473"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>

  <!-- Large decorative circle (background) -->
  <circle cx="950" cy="315" r="280" fill="#fb923c" fill-opacity="0.04"/>
  <circle cx="950" cy="315" r="200" fill="#fb923c" fill-opacity="0.03"/>

  <!-- Icon -->
  <text x="100" y="230" font-size="90" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">📅</text>

  <!-- Title -->
  <text x="100" y="340" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="64" font-weight="800" fill="white" letter-spacing="-1">Eventos</text>

  <!-- Subtitle -->
  <text x="100" y="395" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="28" font-weight="400" fill="white" fill-opacity="0.65">Calendario, carreras especiales e inscripciones</text>

  <!-- Divider line -->
  <rect x="100" y="430" width="160" height="3" rx="2" fill="#fb923c" fill-opacity="0.7"/>

  <!-- Brand footer -->
  <text x="100" y="550" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="22" font-weight="600" fill="white" fill-opacity="0.5">IMSA</text>
  <text x="170" y="550" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="22" font-weight="400" fill="white" fill-opacity="0.35">GT7 ESP Racing Club</text>

  <!-- URL -->
  <text x="100" y="580" font-family="monospace" font-size="16" fill="#fb923c" fill-opacity="0.5">imsa.trenkit.com</text>
</svg>